<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - izacWares</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light only">

  <style>
  html {
    color-scheme: light;
  }

  body {
    font-family: Arial, Helvetica, sans-serif;
    line-height: 1.6;
    max-width: 800px;
    margin: auto;
    padding: 20px;

    background: #241f1d;
    color: #ced1d4;
  }

  h1 {
    color: #000;
    margin: 0 0 20px 0;
  }

  a {
    color: #000;
    text-decoration: none;
  }

  a:hover {
    color: #222;
  }

  p {
    margin: 0 0 24px 0;
  }

  form {
    margin-top: 24px;
  }

  label {
    display: block;
    margin: 0 0 6px 0;
    font-weight: bold;
  }

  input,
  textarea {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    margin: 0 0 18px 0;

    border: 1px solid #444;
    border-radius: 4px;

    background: #1a1a1a;
    color: #ced1d4;

    box-sizing: border-box;
  }

  textarea {
    resize: vertical;
    min-height: 120px;
  }

  button {
    background-color: #000;
    color: #ced1d4;
    border: none;
    padding: 12px 24px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 4px;
    margin-top: 4px;
  }

  button:hover {
    background-color: #222;
  }

  .note {
    margin-top: 24px;
    font-size: 13px;
    color: #aaa;
  }

  ::-webkit-scrollbar {
    width: 8px;
  }

  ::-webkit-scrollbar-track {
    background: #241f1d;
  }

  ::-webkit-scrollbar-thumb {
    background: #000;
    border-radius: 4px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: #333;
  }
</style>
</head>

<body>

  <a href="/">← Home</a>

  <h1>Contact</h1>

  <p>
    If you have any questions, inquiries, or business-related requests regarding izacWares,
    please feel free to contact us using the form below.
  </p>

  <!-- Contact Form -->
  <form action="https://formspree.io/f/xeeqvldn" method="POST">
    <label for="name">Name</label>
    <input id="name" type="text" name="name" required>

    <label for="email">Email</label>
    <input id="email" type="email" name="email" required>

    <label for="message">Message</label>
    <textarea id="message" name="message" required></textarea>

    <button type="submit">Send Message</button>
  </form>

  <p class="note">
    We do our best to review and respond to inquiries as promptly as possible.
  </p>

</body>
</html>
